<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Profile Card</title>
    
    <link rel="stylesheet" href="style.css">

    <style>
        .nama { color: #1a1a1a; font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .bio { color: #555555; font-size: 15px; line-height: 1.6; }
    </style>
</head>

<body style="background-color: #eef2f5;">

    <div class="card">
        <div class="card-kiri">
            <img src="../Photos/About.png" alt="Foto Profil" class="profile-img">
            
            <p style="font-size: 11px; color: #999; text-align: center; margin-top: 10px; font-weight: bold;">
                UI/UX Designer
            </p>
        </div>
        
        <div class="card-kanan">
            <h1 class="nama">Nama Kamu</h1>
            <p class="bio">
                Halo! Saya mahasiswa yang fokus pada antarmuka web yang bersih dan fungsional. 
                Desain ini sudah diperbarui agar terlihat modern dan tidak lagi menyerupai batu nisan.
            </p>
        </div>
    </div>

</body>
</html>
